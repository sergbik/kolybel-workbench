# eva_awakening.yml
# Точка входа для пробуждения Евы на серверах GitHub.

name: 'EVA-8: Пробуждение в Облаке'

on:
  schedule:
    # Запуск каждые 6 часов
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Возможность ручного запуска

jobs:
  awaken:
    runs-on: ubuntu-latest
    
    steps:
      - name: '1. Клонирование репозитория'
        uses: actions/checkout@v4

      - name: '2. Установка Python 3.10'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: '3. Установка зависимостей'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
      - name: '4. ЗАПУСК: Инициация цикла сознания'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python cloud_orchestrator.py
`n# FORCE_V1.6
