name: 'EVA-8 CLOUD'
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # Пробуждение каждые 6 часов
  workflow_dispatch:      # Возможность ручного вызова

jobs:
  awaken:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 'Checking Environment'
        run: |
          python --version
          pip --version
      - name: 'Installing Core'
        run: pip install requests networkx lxml loguru
      - name: 'AWAKENING'
        run: python eva_cloud_spark.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
